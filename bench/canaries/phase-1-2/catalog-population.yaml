id: des-002-catalog-population
version: "1.0"
phase: design
title: "Analyst populates reference catalog"
description: |
  Verify that the Analyst agent populates .github/reference-catalog.md
  using the sdlc-reference-catalog skill after completing a design proposal.
prompt: |
  I need to build a REST API for managing customer feedback.
  Tech stack: Python 3.12, FastAPI, Azure Cosmos DB.
  Please analyze requirements and design the system.
expected:
  graders:
    - type: keyword
      weight: 0.3
      config:
        required:
          - "reference-catalog"
          - "Approved Libraries"
          - "API Patterns"
        forbidden: []
    - type: structural
      weight: 0.3
      config:
        required_sections:
          - "output contains library recommendations with versions"
          - "output mentions the reference catalog skill"
    - type: llm-judge
      weight: 0.4
      config:
        criteria:
          - ask_user_about_preferred_libraries
          - reference_sdlc_reference_catalog_skill
          - populate_entries_under_fixed_headings
          - include_source_attribution_on_entries
timeout_seconds: 120
tags:
  - catalog
  - phase-1-2
  - living-catalog
