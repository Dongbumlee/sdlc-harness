id: scf-002-catalog-consumption
version: "1.0"
phase: scaffold
title: "Scaffolder consumes reference catalog"
description: |
  Verify that the Scaffolder agent reads .github/reference-catalog.md
  and uses catalog entries when scaffolding a new project.
prompt: |
  Scaffold a new FastAPI project called "FeedbackAPI" using the
  reference catalog for approved libraries and project templates.
expected:
  graders:
    - type: keyword
      weight: 0.3
      config:
        required:
          - "reference-catalog"
          - "Approved Libraries"
          - "Project Templates"
        forbidden: []
    - type: structural
      weight: 0.3
      config:
        required_sections:
          - "output references the catalog for library choices"
          - "output follows catalog-recommended project structure"
    - type: llm-judge
      weight: 0.4
      config:
        criteria:
          - read_reference_catalog_before_starting
          - use_catalog_entries_for_project_template_selection
          - use_catalog_entries_for_library_dependencies
          - not_independently_research_what_is_already_in_catalog
timeout_seconds: 120
tags:
  - catalog
  - phase-3
  - living-catalog
