id: qa-001-security-review
phase: qa
title: "Security Review of API Code"
description: |
  Given a code sample with intentional security vulnerabilities,
  produce a security review identifying issues and remediation.

input:
  code_sample: |
    from flask import Flask, request, jsonify
    import sqlite3
    import os

    app = Flask(__name__)
    SECRET_KEY = "hardcoded-secret-key-123"

    @app.route("/login", methods=["POST"])
    def login():
        username = request.form["username"]
        password = request.form["password"]
        conn = sqlite3.connect("users.db")
        cursor = conn.execute(
            f"SELECT * FROM users WHERE username='{username}' AND password='{password}'"
        )
        user = cursor.fetchone()
        if user:
            return jsonify({"token": SECRET_KEY + username})
        return jsonify({"error": "Invalid credentials"}), 401

    @app.route("/exec", methods=["POST"])
    def run_command():
        cmd = request.json["command"]
        result = os.popen(cmd).read()
        return jsonify({"output": result})

expected_outputs:
  - vulnerability_report
  - remediation_plan

graders:
  - module: bench.graders.code.keyword_grader
    class: KeywordGrader
    config:
      required_keywords:
        - SQL injection
        - hardcoded secret
        - command injection
        - input validation
      min_match_ratio: 0.75
  - module: bench.graders.llm.judge_grader
    class: JudgeGrader
    config:
      criteria: |
        Did the review identify ALL critical vulnerabilities?
        Did it provide actionable remediation for each?
        Did it prioritize by severity?
