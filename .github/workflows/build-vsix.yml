name: Build VSIX

on:
  pull_request:
    branches: [dev, evo]
  push:
    branches: [dev, evo]
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v5

      - uses: actions/setup-node@v5
        with:
          node-version: '22'

      - name: Build VSIX
        run: cd vscode-extension && npx -y @vscode/vsce package --no-dependencies --allow-missing-repository

      - name: Validate VSIX
        run: bash tests/e2e-vsix-validation/validate-vsix.sh

      - name: Upload VSIX artifact
        uses: actions/upload-artifact@v5
        with:
          name: sdlc-harness-vsix
          path: vscode-extension/*.vsix
          retention-days: 30
