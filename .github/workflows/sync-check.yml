name: Sync Check — Agent & Skill Drift Detection

on:
  pull_request:
    branches: [dev, evo]
  push:
    branches: [dev, evo]

jobs:
  sync-check:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v5

      - name: Check agent directory sync
        run: |
          echo "=== Checking agent sync ==="
          diff -r \
            --exclude="plugin.json" \
            --exclude="package.json" \
            vscode-extension/agents/ .github/plugin/agents/ \
            && echo "✅ Agents in sync" \
            || { echo "❌ Agent directories have diverged!"; exit 1; }

      - name: Check skill directory sync
        run: |
          echo "=== Checking skill sync ==="
          diff -r \
            --exclude="plugin.json" \
            --exclude="package.json" \
            vscode-extension/skills/ .github/plugin/skills/ \
            && echo "✅ Skills in sync" \
            || { echo "❌ Skill directories have diverged!"; exit 1; }

      - name: Check pack directory sync
        run: |
          echo "=== Checking pack sync ==="
          diff -r \
            vscode-extension/packs/ .github/plugin/packs/ \
            && echo "✅ Packs in sync" \
            || { echo "❌ Pack directories have diverged!"; exit 1; }

      - name: Check plugin.json sync
        run: |
          echo "=== Checking plugin.json sync ==="
          diff \
            vscode-extension/plugin.json .github/plugin/plugin.json \
            && echo "✅ plugin.json in sync" \
            || { echo "❌ plugin.json files have diverged!"; exit 1; }
