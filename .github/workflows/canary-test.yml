name: Canary Spec Validation

on:
  workflow_dispatch:
  push:
    branches: [dev, evo]
    paths:
      - 'bench/canaries/**'
      - 'schemas/canary-spec.schema.json'
      - 'tools/validate_canaries.py'
      - '.github/plugin/**'
  pull_request:
    branches: [dev, evo]
    paths:
      - 'bench/canaries/**'
      - 'schemas/canary-spec.schema.json'
      - 'tools/validate_canaries.py'
      - '.github/plugin/**'

permissions:
  contents: read

jobs:
  validate-canaries:
    name: Validate canary specs (schema)
    runs-on: ubuntu-latest
    timeout-minutes: 5
    env:
      FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true

    steps:
      - uses: actions/checkout@v5

      - uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Install validation dependencies
        run: pip install jsonschema pyyaml

      - name: Validate canary specs against schema
        run: |
          echo "=== Validating canary specs against schema ==="
          python tools/validate_canaries.py

