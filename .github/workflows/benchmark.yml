name: Canary Spec Validation

on:
  workflow_dispatch:
  push:
    branches: [dev, evo]
    paths:
      - 'bench/canaries/**'
  pull_request:
    branches: [dev, evo]
    paths:
      - 'bench/canaries/**'

permissions:
  contents: read

jobs:
  validate-canaries:
    runs-on: ubuntu-latest
    timeout-minutes: 5

    steps:
      - uses: actions/checkout@v4

      - name: Validate canary spec structure
        run: |
          echo "=== Validating canary specs ==="
          errors=0
          for dir in bench/canaries/*/; do
            phase=$(basename "$dir")
            spec="$dir/canary-spec.yaml"
            if [ ! -f "$spec" ]; then
              echo "FAIL: $phase - missing canary-spec.yaml"
              errors=$((errors + 1))
            else
              echo "PASS: $phase - canary-spec.yaml exists"
            fi
          done

          if [ $errors -gt 0 ]; then
            echo "::error::$errors canary spec(s) missing"
            exit 1
          fi
          echo "All canary specs validated"
