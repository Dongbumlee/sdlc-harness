harness:
  version: "1.0"
  profile: azure-dotnet

project:
  name: ""
  description: ""

stack:
  language: csharp
  framework: aspnet
  test_framework: xunit
  package_manager: nuget
  architecture:
    style: clean
    api_style: rest

cloud:
  provider: azure
  iac: bicep
  registry: acr
  ci_cd: github_actions

mcp:
  servers:
    - name: awesome-copilot
      required: true
    - name: github-mcp
      required: true
    - name: context7
      required: true
    - name: azure-devops
      required: true
    - name: azure-mcp
      required: true
    - name: microsoft-learn
      required: true

phases:
  requirements: true
  design: true
  scaffold: true
  deploy: true
  implement: true
  document: true
  qa: true
  rai: true
  release: true

quality:
  min_composite_score: 7.0
  security_minimum: 8.0
  test_coverage_minimum: 80
